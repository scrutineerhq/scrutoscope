name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build distribution zip
        run: |
          mkdir -p /tmp/scrutoscope-build/scrutoscope
          rsync -a --exclude-from=.distignore . /tmp/scrutoscope-build/scrutoscope/
          cd /tmp/scrutoscope-build
          zip -r scrutoscope.zip scrutoscope/ -q

      - name: Create release with zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" /tmp/scrutoscope-build/scrutoscope.zip \
            --title "$TAG" \
            --generate-notes \
            --latest
